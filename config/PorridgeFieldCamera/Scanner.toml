## Arduino Field Camera Device
[Devices.field_camera]
deviceType = "FieldCameraAdapter"
dependencies = ["serial_pool"]
sensorFolder = "C:/Users/Philip Suskin/Documents/repos/Julia/spericalsensor_ba-janne_hamann/communicationSerialWithArduino"
portAddress = "COM3"  # Adjust to your system (e.g., COM3 on Windows, /dev/ttyUSB0 on Linux)
bufferSize = 2048
numSensors = 37
radius = "37mm"
tDesign = 8
calibrationFile = ""  # Path to calibration file (optional)
measurementRange = 150  # Options: 75, 150, or 300 (in mT)
delim_read = "\r"
delim_write = "\r"
baudrate = 115200
ndatabits = 8
parity = "SP_PARITY_NONE"
nstopbits = 1
timeout_ms = 1000
