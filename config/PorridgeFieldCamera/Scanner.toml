## Arduino Field Camera (37 TMAG5170 sensors, trigger-based acquisition)
[Devices.field_camera]
deviceType = "FieldCameraAdapter"
portAddress = "/dev/ttyACM0"
numSensors = 37
measurementRange = 150  # Options: 75, 150, 300 (mT)
delim_read = "\r"
delim_write = "\r"
baudrate = 250000
ndatabits = 8
nstopbits = 1
timeout_ms = 2000
