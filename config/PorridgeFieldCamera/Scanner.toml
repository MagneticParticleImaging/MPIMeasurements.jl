[General]
boreSize = "70mm"
facility = "Institute for Biomedical Imaging"
manufacturer = "Förger GmbH"
name = "PorridgeFieldCamera"
topology = "FFP" 
gradient = "42T/m"
datasetStore = "./DataStore"
defaultSequence = "1DSequence"
defaultProtocol = "PorridgeFieldMeasurement"
producerThreadID = 1
consumerThreadID = 2
protocolThreadID = 3
serialThreadID = 4

[Devices]
initializationOrder = [
	"serial_pool",
	"rp_cluster",
	"field_camera"
]

[Devices.serial_pool]
deviceType = "SerialPortPool"
dependencies = []

[Devices.rp_cluster]
deviceType = "RedPitayaDAQ"
dependencies = []
ips = ["192.168.1.100","192.168.1.101","192.168.1.102","192.168.1.103","192.168.1.104","192.168.1.105","192.168.1.106","192.168.1.107","192.168.1.108"]

## Receive Channels
[Devices.rp_cluster.rx1]
type = "rx"
channel = 1
limitPeak = "1V"

## Feedback Channels
[Devices.rp_cluster.feedbackx]
type = "rx"
channel = 3
limitPeak = "1V"

[Devices.rp_cluster.feedbacky]
type = "rx"
channel = 4
limitPeak = "1V"

## Coil Channels
[Devices.rp_cluster.coil1]
type = "txSlow"
channel = 1
calibration = "1.0V/A"

[Devices.rp_cluster.coil1_fast]
type = "tx"
channel = 1
limitPeak = "0.98V"
sinkImpedance = "HIGH"
calibration = "1.0V/T"

